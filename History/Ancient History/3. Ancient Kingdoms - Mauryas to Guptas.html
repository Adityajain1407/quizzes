    // --- Per-question capture ---
    async function captureSingleQuestion(origIdx) {
        const q = FULL_QUIZ[origIdx];
        const userChoice = userSelections[origIdx];
        let optsHtml = '';
        for (let i = 0; i < q.opts.length; i++) {
            const optLetter = String.fromCharCode(65 + i);
            let extraClass = '';
            if (optLetter === q.ans) extraClass = 'correct-highlight';
            else if (userChoice === optLetter && userChoice !== q.ans) extraClass = 'wrong-highlight';
            optsHtml += `<div class="option ${extraClass}">${q.opts[i]}</div>`;
        }
        const questionNumber = order.indexOf(origIdx) + 1;
        const captureDiv = document.createElement('div');
        captureDiv.className = 'jpeg-capture';
        captureDiv.style.cssText = 'position:absolute; top:-9999px; left:-9999px; width:800px; background:' + (document.body.classList.contains('dark-theme') ? '#1a1f2c' : 'white');
        captureDiv.innerHTML = `<div class="jpeg-capture"><h1 style="text-align:center;">📸 ${topicName}</h1><div class="question-block"><div class="question-text">${questionNumber}. ${q.text}</div><div class="options-list">${optsHtml}</div><div class="explanation-box">${formatExplanationRich(q.exp)}</div></div><p style="text-align:center;">Captured on ${new Date().toLocaleString()}</p></div>`;
        document.body.appendChild(captureDiv);
        try {
            const canvas = await html2canvas(captureDiv, { scale: 2 });
            const a = document.createElement('a');
            a.download = `${topicName.replace(/[^\w\s]/g, '').replace(/\s+/g, '_')} - Q${questionNumber}.jpg`;
            a.href = canvas.toDataURL('image/jpeg', 0.92);
            a.click();
        } catch(e) { console.error(e); alert("Capture failed"); }
        finally { document.body.removeChild(captureDiv); }
    }

    function updateNavPaneColors() {
        const navGrid = document.getElementById('navGrid');
        if (!navGrid) return;
        const btns = navGrid.querySelectorAll('.nav-btn');
        for (let i = 0; i < btns.length; i++) {
            const state = answersState[order[i]];
            const btn = btns[i];
            btn.classList.remove('correct', 'incorrect', 'skipped', 'unanswered');
            if (state === 'correct') btn.classList.add('correct');
            else if (state === 'incorrect') btn.classList.add('incorrect');
            else if (state === 'skipped') btn.classList.add('skipped');
            else btn.classList.add('unanswered');

                currentPos = newPos;
                currentSkipReviewIndex = skipReviewList.indexOf(order[newPos]);

    // --- Answer / Skip / Finish ---
    function handleAnswer(selectedLetter) {
        autoResumeTimerIfPaused();
        if (!quizActive) return;
        const origIdx = order[currentPos];
        const isCorrect = selectedLetter === FULL_QUIZ[origIdx].ans;
        if (skipReviewMode) {
            if (answersState[origIdx] !== 'skipped') return;
            userSelections[origIdx] = selectedLetter;
            answersState[origIdx] = isCorrect ? 'correct' : 'incorrect';
            updateTopStats(); renderCurrent(); autoSave();
            return;
        }
        if (answersState[origIdx] === 'unanswered' || answersState[origIdx] === 'skipped') {
            userSelections[origIdx] = selectedLetter;
            answersState[origIdx] = isCorrect ? 'correct' : 'incorrect';
            updateTopStats(); renderCurrent(); autoSave();
        }

            if (idx !== -1) skipReviewList.splice(idx, 1);
            if (skipReviewList.length > 0) {
                let nextPos = order.indexOf(skipReviewList[0]);
                if (nextPos !== -1) moveToQuestion(nextPos);
            } else endSkipReviewSession();
            autoSave(); return;
        }
        const currentOrig = order[currentPos];
        if (answersState[currentOrig] === 'correct' || answersState[currentOrig] === 'incorrect') {
            let nxt = getNextUnansweredPos(currentPos + 1);
            if (nxt !== -1) moveToQuestion(nxt); else promptFinishOrReview();
            autoSave();
        }
    }
    function skipCurrent() {
        autoResumeTimerIfPaused();
        if (!quizActive) return;
        const currentOrig = order[currentPos];
        if (!skipReviewMode && (answersState[currentOrig] === 'correct' || answersState[currentOrig] === 'incorrect')) return;
        if (skipReviewMode) {
            if (currentSkipReviewIndex + 1 < skipReviewList.length) {
                let nextPos = order.indexOf(skipReviewList[currentSkipReviewIndex + 1]);
                if (nextPos !== -1) moveToQuestion(nextPos);
            } else endSkipReviewSession();
            autoSave(); return;
        }
        if (answersState[currentOrig] === 'unanswered') {
            answersState[currentOrig] = 'skipped';
            updateTopStats();
            let nxt = getNextUnansweredPos(currentPos + 1);
            if (nxt !== -1) moveToQuestion(nxt); else promptFinishOrReview();
        } else if (answersState[currentOrig] === 'skipped') {
            let nxt = getNextUnansweredPos(currentPos + 1);
            if (nxt !== -1) moveToQuestion(nxt); else promptFinishOrReview();
        }
        autoSave();
    }
    function promptFinishOrReview() {
        if (!quizActive) return;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3>Finish Quiz?</h3><p>Do you want to finish this quiz?</p><button id="yesFinish">Yes, Finish</button><button id="noFinish">No, Review Skipped</button></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('yesFinish').onclick = () => { modalDiv.remove(); finishQuiz(); };
        document.getElementById('noFinish').onclick = () => {
            modalDiv.remove();
            const skippedIndices = [];
            for (let i = 0; i < answersState.length; i++) if (answersState[i] === 'skipped') skippedIndices.push(i);
            if (skippedIndices.length === 0) finishQuiz(); else enterSkipReviewMode(skippedIndices);
        };
    }
    function enterSkipReviewMode(skippedIndices) {
        skipReviewMode = true; skipReviewList = [...skippedIndices]; currentSkipReviewIndex = 0;
        let firstPos = order.indexOf(skipReviewList[0]);
        if (firstPos !== -1) moveToQuestion(firstPos); else renderCurrent();
        autoSave();
    }
    function endSkipReviewSession() { skipReviewMode = false; skipReviewList = []; promptFinishOrReview(); }

    // --- Full review JPEG capture ---
    async function saveReviewAsJPEG() {
        const reviewQuestions = [];
        for (let i = 0; i < order.length; i++) {
            const origIdx = order[i];
            const state = answersState[origIdx];
            if (state === 'incorrect' || state === 'skipped') {
                const q = FULL_QUIZ[origIdx];
                reviewQuestions.push({ id: origIdx+1, question: q.text, options: q.opts, correctAnswer: q.ans, userAnswer: userSelections[origIdx] || null, explanation: q.exp, status: state });
            }
        }
        if (reviewQuestions.length === 0) { alert("No incorrect or skipped questions."); return; }
        const captureDiv = document.createElement('div');
        captureDiv.className = 'jpeg-capture';
        captureDiv.style.cssText = 'position:absolute; top:-9999px; left:-9999px; width:800px; background:' + (document.body.classList.contains('dark-theme') ? '#1a1f2c' : 'white');
        let html = `<h1 style="text-align:center;">📝 Quiz Review: Incorrect & Skipped</h1><p style="text-align:center;">${new Date().toLocaleString()}</p>`;
        for (let item of reviewQuestions) {
            let optsHtml = '';
            for (let opt of item.options) {
                let optLetter = opt.charAt(0);
                let extraClass = '';
                if (optLetter === item.correctAnswer) extraClass = 'correct-highlight';
                else if (item.userAnswer === optLetter && item.userAnswer !== item.correctAnswer) extraClass = 'wrong-highlight';
                optsHtml += `<div class="option ${extraClass}">${opt}</div>`;
            }
            html += `<div class="question-block"><div class="question-text">${item.id}. ${item.question}</div><div class="options-list">${optsHtml}</div><div style="margin:10px 0;">Your answer: ${item.userAnswer || 'Skipped'} | Correct: ${item.correctAnswer}</div><div class="explanation-box">${formatExplanationRich(item.explanation)}</div></div><hr>`;
        }
        captureDiv.innerHTML = html;
        document.body.appendChild(captureDiv);
        try {
            const canvas = await html2canvas(captureDiv, { scale: 2 });
            const a = document.createElement('a');
            const now = new Date();
            const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
            a.download = `${topicName.replace(/[^\w\s]/g, '').replace(/\s+/g, '_')}_${ts}.jpg`;
            a.href = canvas.toDataURL('image/jpeg', 0.92);
            a.click();
        } catch(e) { console.error(e); alert("Capture failed"); }
        finally { document.body.removeChild(captureDiv); }
    }

    // --- Finish & Stats ---
    function finishQuiz() {
        if (timerInterval) stopTimer();
        quizActive = false; quizInProgress = false;
        const { score, attempted, displayScore } = computeStats();
        addAttemptToLeaderboard(score, attempted, TOTAL_QS);
        clearSavedState();
        let finalElapsed = elapsedSeconds;
        if (!timerPaused && startTime) finalElapsed = Math.floor((Date.now() - startTime) / 1000);
        const stats = computeStats();
        const finalHtml = `<div class="finish-stats"><h2>🎉 QUIZ COMPLETE! 🎉</h2><div class="score-big">⭐ ${stats.displayScore} / ${stats.attempted} ⭐</div><div class="stats-grid"><div class="stat-card"><span>✅ CORRECT</span><span>${stats.correct}</span></div><div class="stat-card"><span>❌ INCORRECT</span><span>${stats.incorrect}</span></div><div class="stat-card"><span>⏭️ SKIPPED</span><span>${stats.skipped}</span></div><div class="stat-card"><span>🎯 ATTEMPTED</span><span>${stats.attempted} / ${stats.total}</span></div></div><p style="margin:1rem 0;">⏱️ Time taken: <strong>${formatTime(finalElapsed)}</strong></p><button id="reviewBtn" style="background:#ff9040;">📖 Review Incorrect & Skipped</button><button id="jpegSaveBtn" style="background:#2c6e8f;">📸 Capture Review</button><button id="restartQuizBtn" style="background:#3c6e8f;">🔄 Restart Quiz</button><div class="leaderboard-section"><h3>🏆 Leaderboard <button class="reset-logs-btn" id="resetLeaderboardBtn">🗑️ Reset Logs</button></h3><div id="leaderboardContainer"></div></div></div>`;
        document.getElementById('quizMainContent').innerHTML = finalHtml;
        document.getElementById('reviewBtn').onclick = () => enterPostReviewMode();
        document.getElementById('jpegSaveBtn').onclick = () => saveReviewAsJPEG();
        document.getElementById('restartQuizBtn').onclick = () => { clearSavedState(); location.reload(); };
        renderLeaderboard();
        document.getElementById('resetLeaderboardBtn').onclick = () => resetLeaderboard();
    }

    // --- Post-finish review ---
    function enterPostReviewMode() {
        const incorrectSkipped = [];
        for (let i = 0; i < order.length; i++) {
            const state = answersState[order[i]];
            if (state === 'incorrect' || state === 'skipped') incorrectSkipped.push(order[i]);
        }
        if (incorrectSkipped.length === 0) return;
        reviewItems = incorrectSkipped; reviewCurrentIdx = 0; showReviewItem(0);
    }
    function showReviewItem(idx) {
        const orig = reviewItems[idx];
        const q = FULL_QUIZ[orig];
        const userChoice = userSelections[orig];
        let optsHtml = '';
        for (let i = 0; i < q.opts.length; i++) {
            const optLetter = String.fromCharCode(65 + i);
            let cls = '';
            if (optLetter === q.ans) cls = 'correct-highlight';
            else if (userChoice === optLetter && userChoice !== q.ans) cls = 'wrong-highlight';
            optsHtml += `<div class="option ${cls}" style="pointer-events:none;">${q.opts[i]}</div>`;
        }
        const reviewHtml = `<div class="review-counter">📌 Review ${idx+1} of ${reviewItems.length}</div><div class="question-text">${q.text}</div><div class="options-list">${optsHtml}</div><div class="explanation-box">${formatExplanationRich(q.exp)}</div><div style="display:flex; gap:12px; justify-content:center; margin-top:20px;"><button id="reviewPrev" ${idx===0?'disabled':''}>Previous</button><button id="reviewNext" ${idx===reviewItems.length-1?'disabled':''}>Next</button><button id="reviewBackStats">Back to Stats</button></div>`;
        document.getElementById('quizMainContent').innerHTML = reviewHtml;
        document.getElementById('reviewPrev')?.addEventListener('click', () => showReviewItem(idx-1));
        document.getElementById('reviewNext')?.addEventListener('click', () => showReviewItem(idx+1));
        document.getElementById('reviewBackStats').onclick = () => finishQuiz();
    }

    // --- Render question ---
    function renderCurrent() {
        if (!quizActive) return;
        const origIdx = order[currentPos];
        const q = FULL_QUIZ[origIdx];
        const state = answersState[origIdx];
        const userChoice = userSelections[origIdx];
        let optionsHtml = '';
        for (let i = 0; i < q.opts.length; i++) {
            const optLetter = String.fromCharCode(65 + i);
            let addClass = '';
            let isClickable = true;
            if (state === 'correct' || state === 'incorrect') {
                if (optLetter === q.ans) addClass = 'correct-highlight';
                else if (userChoice === optLetter && userChoice !== q.ans) addClass = 'wrong-highlight';
                isClickable = false;
            }
            optionsHtml += `<div class="option ${addClass}" ${isClickable ? `onclick="handleAnswer('${optLetter}')"` : ''} ${!isClickable ? 'style="pointer-events:none;"' : ''}>${q.opts[i]}</div>`;
        }
        let explanationBlock = '', actionRow = '';
        if (state === 'correct' || state === 'incorrect') {
            explanationBlock = `<div class="explanation-box">${formatExplanationRich(q.exp)}</div>`;
            actionRow = `<div class="action-row"><button class="next-btn" id="nextAfterAnswerBtn">➡ Next Question</button><button class="capture-btn" id="captureSingleBtn" title="Capture this question as JPG">📷 Capture</button></div>`;
        }
        let infoMsg = '';
        if (state === 'unanswered') infoMsg = '<div class="info-message">⚡ Select an answer above. Use Skip if unsure.</div>';
        else if (state === 'skipped') infoMsg = '<div class="info-message">⏭️ This question was skipped. You can answer now.</div>';
        document.getElementById('quizMainContent').innerHTML = `<div class="question-text">${currentPos+1}. ${q.text}</div><div class="options-list">${optionsHtml}</div>${explanationBlock}${actionRow}${infoMsg}`;
        if (state === 'correct' || state === 'incorrect') {
            document.getElementById('nextAfterAnswerBtn').onclick = nextAfterAnswer;
            document.getElementById('captureSingleBtn').onclick = () => captureSingleQuestion(origIdx);
        }
    }

    // --- Font slider ---
    function initFontSlider() {
        const fontBtn = document.getElementById('fontToggleBtn');
        if (!fontBtn) return;
        const old = document.querySelector('.font-slider-panel');
        if (old) old.remove();
        let visible = false;
        const panel = document.createElement('div');
        panel.className = 'font-slider-panel';
        panel.style.display = 'none';
        panel.innerHTML = `<label>🔤 Font size:</label><input type="range" id="fontSlider" min="10" max="32" step="1" value="16"><span id="fontPercent">100%</span>`;
        document.querySelector('.stats-bar').insertAdjacentElement('afterend', panel);
        const slider = document.getElementById('fontSlider');
        const pct = document.getElementById('fontPercent');
        const current = parseInt(document.documentElement.style.fontSize) || 16;
        slider.value = current;
        pct.innerText = Math.round((current/16)*100) + '%';
        slider.addEventListener('input', (e) => {
            const px = parseInt(e.target.value);
            document.documentElement.style.fontSize = px + 'px';
            pct.innerText = Math.round((px/16)*100) + '%';
            currentFontSize = px; autoSave();
        });
        fontBtn.addEventListener('click', () => { visible = !visible; panel.style.display = visible ? 'flex' : 'none'; });
    }

    // --- Dark mode toggle ---
    function initDarkModeToggle() {
        const btn = document.getElementById('darkModeToggle');
        if (!btn) return;
        const update = () => {
            const dark = document.body.classList.contains('dark-theme');
            btn.innerHTML = dark ? '☀️ Light' : '🌙 Dark';
            isDarkMode = dark; autoSave();
        };
        btn.addEventListener('click', () => { document.body.classList.toggle('dark-theme'); update(); });
        update();
    }

    // --- Resume saved quiz ---
    function resumeSavedQuiz(savedState) {
        mode = savedState.mode; order = savedState.order; currentPos = savedState.currentPos;
        answersState = savedState.answersState; userSelections = savedState.userSelections;
        elapsedSeconds = savedState.elapsedSeconds; timerPaused = savedState.timerPaused;
        skipReviewMode = savedState.skipReviewMode || false;
        skipReviewList = savedState.skipReviewList || [];
        currentSkipReviewIndex = savedState.currentSkipReviewIndex || 0;
        if (savedState.isDarkMode !== undefined) applyUIPreferences(savedState.isDarkMode, savedState.fontSize || 16);
        quizActive = true; quizInProgress = true;
        renderMainUI(); initDarkModeToggle(); initFontSlider();
        startTime = Date.now() - (elapsedSeconds * 1000);
        if (!timerPaused) {
            timerInterval = setInterval(() => {
                if (!quizActive || timerPaused) return;
                document.getElementById('timerDisplay').innerText = formatTime(Math.floor((Date.now() - startTime) / 1000));
            }, 1000);
        } else {
            const el = document.getElementById('timerContainer');
            if (el) el.style.opacity = '0.7';
        }
        updateTopStats(); buildNavPane(); renderCurrent();
        leaderboardLoggedForThisSession = false;
    }

    // --- Init quiz ---
    function initializeQuiz(selectedMode) {
        mode = selectedMode;
        let indices = [...Array(TOTAL_QS).keys()];
        if (mode === 'random') {
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
        }
        order = indices;
        answersState = new Array(TOTAL_QS).fill('unanswered');
        userSelections = new Array(TOTAL_QS).fill(null);
        currentPos = 0; quizActive = true;
        skipReviewMode = false; skipReviewList = [];
        elapsedSeconds = 0; timerPaused = false;
        quizInProgress = true; leaderboardLoggedForThisSession = false;
        clearSavedState();
        startTimer(); renderMainUI(); initDarkModeToggle(); initFontSlider();
    }

    // --- Render main quiz UI ---
    function renderMainUI() {
        const root = document.getElementById('root');
        root.innerHTML = `<div class="quiz-container"><div class="stats-bar"><div class="stats-group"><div class="stat"><span>✅ Correct</span> <span id="statCorrect">0</span></div><div class="stat"><span>❌ Wrong</span> <span id="statWrong">0</span></div><div class="stat"><span>⏭️ Skip</span> <span id="statSkip">0</span></div></div><div class="timer" id="timerContainer">⏱️ <span id="timerDisplay">00:00</span></div><div class="action-buttons"><button class="action-btn" id="toggleNavBtn">☰ Questions</button><button class="action-btn" id="skipBtn">⏭️ Skip</button><button class="action-btn" id="finishQuizBtn">🏁 Finish</button><button class="action-btn dark-mode-btn" id="darkModeToggle">🌙 Dark</button><button class="action-btn" id="fontToggleBtn">🔤 A</button></div></div><div id="navPane" class="nav-pane"><div id="navGrid" class="nav-grid"></div></div><div id="quizMainContent" class="question-panel"></div></div>`;
        document.getElementById('toggleNavBtn').onclick = toggleNavPane;
        document.getElementById('skipBtn').onclick = skipCurrent;
        document.getElementById('finishQuizBtn').onclick = () => { if (!skipReviewMode) promptFinishOrReview(); else endSkipReviewSession(); };
        document.getElementById('timerContainer').addEventListener('click', toggleTimerPause);
        buildNavPane(); renderCurrent(); updateTopStats();
    }

    // --- beforeunload exit warning ---
    function setupBeforeUnload() {
        window.addEventListener('beforeunload', (e) => {
            if (quizInProgress) {
                if (!timerPaused) pauseTimer();
                e.preventDefault();
                e.returnValue = 'You have unsaved quiz progress. Are you sure you want to leave?';
                return e.returnValue;
            }
        });
        window.addEventListener('focus', () => {
            if (timerPausedByBeforeUnload && timerPaused && quizInProgress) { resumeTimer(); timerPausedByBeforeUnload = false; }
        });
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && timerPausedByBeforeUnload && timerPaused && quizInProgress) { resumeTimer(); timerPausedByBeforeUnload = false; }
        });
    }
    setupBeforeUnload();

    // --- Instructions modal ---
    function showInstructions() {
        const modal = document.createElement('div');
        modal.className = 'instructions-modal';
        modal.innerHTML = `<div class="instructions-card"><div class="instructions-header"><h3>📖 How to use this quiz</h3><button class="close-instructions" id="closeInstructionsBtn">✖</button></div><ul class="instructions-list"><li><strong>⏱️ Timer:</strong> Click the clock to pause/resume. Timer also resumes when you answer or skip.</li><li><strong>💾 Auto‑save:</strong> Your progress, dark mode, and font size are saved automatically. Close the page and resume later.</li><li><strong>⏭️ Skip button:</strong> Leave a question for later review – it will appear in the final review list.</li><li><strong>📷 Capture:</strong> After answering any question, click the camera button to save a JPG snapshot of that question (including correct/wrong highlights and the explanation). Perfect for revising tricky questions later.</li><li><strong>🌙 Dark mode:</strong> Toggle the moon/sun button to reduce eye strain in low light.</li><li><strong>🔤 Font size:</strong> Use the A button to increase or decrease text size – great for accessibility.</li><li><strong>🏆 Leaderboard:</strong> Only attempts where you answer more than 40% of total questions are recorded. Score = +1 per correct, -0.33 per wrong.</li><li><strong>📖 Review:</strong> After finishing, you can review all incorrect and skipped questions, and export them as a JPG.</li></ul><p style="margin-top:1rem; font-size:0.8rem; text-align:center; color:#64748b;">✨ Good luck and have fun! ✨</p></div>`;
        document.body.appendChild(modal);
        document.getElementById('closeInstructionsBtn').onclick = () => modal.remove();
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    // --- Welcome screen ---
    async function showWelcome() {
        const root = document.getElementById('root');
        root.innerHTML = `<div class="welcome-overlay"><div class="welcome-card" style="text-align:center;"><p style="font-size:1.2rem;">⏳ Loading...</p></div></div>`;
        const saved = await loadQuizState();
        if (saved) {
            const overlay = document.createElement('div');
            overlay.className = 'welcome-overlay';
            overlay.innerHTML = `<div class="welcome-card"><h2>📀 Saved Progress Found</h2><p>You have an unfinished quiz. Do you want to resume where you left off?</p><div class="mode-buttons"><button class="mode-btn" id="resumeYesBtn" style="background:#2c9e4c;">✅ Yes, Resume</button><button class="mode-btn" id="resumeNoBtn" style="background:#c7362b;">❌ No, Start Fresh</button></div></div>`;
            root.innerHTML = '';
            document.body.appendChild(overlay);
            document.getElementById('resumeYesBtn').onclick = () => { overlay.remove(); resumeSavedQuiz(saved); };
            document.getElementById('resumeNoBtn').onclick = async () => { overlay.remove(); await clearSavedState(); showWelcome(); };
            return;
        }
        root.innerHTML = `<div class="welcome-overlay" id="welcomeOverlay"><div class="welcome-card"><h1>${topicName}</h1><div class="quiz-stats-badge">🏺 ${TOTAL_QS} Questions · +1 / -0.33</div><p style="font-weight: 500; margin: 0.5rem 0 0; font-size: 1rem;">Please choose your mode</p><div class="mode-buttons"><button class="mode-btn" id="sysMode">📖 Systematic Mode</button><button class="mode-btn rand" id="randMode">🎲 Random Mode</button></div><div style="text-align: center; margin-top: 12px;"><button class="instructions-small" id="instructionsBtn">📋 Instructions</button></div></div></div>`;
        document.getElementById('sysMode').onclick = () => { document.getElementById('welcomeOverlay').remove(); initializeQuiz('systematic'); };
        document.getElementById('randMode').onclick = () => { document.getElementById('welcomeOverlay').remove(); initializeQuiz('random'); };
        document.getElementById('instructionsBtn').onclick = () => showInstructions();
    }
    showWelcome();
</script>
</body>
</html>
